<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background: soft pastel gradient (rose -> lavender -> sky) -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="50%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>

    <!-- Petals: pink -> purple gradient -->
    <radialGradient id="petalGrad" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#fbcfe8"/>
      <stop offset="60%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </radialGradient>

    <!-- Center circle: warm yellow pastel -->
    <radialGradient id="centerGrad" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </radialGradient>

    <!-- Soft glow behind petals -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="petalShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Soft glow -->
  <circle cx="512" cy="512" r="380" fill="url(#glow)"/>

  <!-- Flower group, 5 petals + center -->
  <g transform="translate(512 512)" filter="url(#petalShadow)">
    <!-- Each petal is an ellipse rotated around the center -->
    <g>
      <ellipse cx="0" cy="-200" rx="120" ry="200" fill="url(#petalGrad)" opacity="0.95"/>
    </g>
    <g transform="rotate(72)">
      <ellipse cx="0" cy="-200" rx="120" ry="200" fill="url(#petalGrad)" opacity="0.95"/>
    </g>
    <g transform="rotate(144)">
      <ellipse cx="0" cy="-200" rx="120" ry="200" fill="url(#petalGrad)" opacity="0.95"/>
    </g>
    <g transform="rotate(216)">
      <ellipse cx="0" cy="-200" rx="120" ry="200" fill="url(#petalGrad)" opacity="0.95"/>
    </g>
    <g transform="rotate(288)">
      <ellipse cx="0" cy="-200" rx="120" ry="200" fill="url(#petalGrad)" opacity="0.95"/>
    </g>

    <!-- Center -->
    <circle cx="0" cy="0" r="90" fill="url(#centerGrad)"/>
    <!-- Center highlight -->
    <circle cx="-25" cy="-25" r="28" fill="#ffffff" opacity="0.5"/>
  </g>
</svg>
