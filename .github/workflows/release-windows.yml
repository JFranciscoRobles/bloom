name: Build & publish Windows installer

on:
  # Manual trigger from the Actions tab (won't publish, just builds artifact)
  workflow_dispatch:
  # Publish when you push a tag like v1.0.0
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron (better-sqlite3)
        run: npm run rebuild

      - name: Build & publish to GitHub Release
        # On a tag push, electron-builder uploads the .exe + latest.yml to the
        # GitHub Release matching the tag (creating it if needed). On manual
        # runs we only build (artifact).
        run: npx electron-vite build && npx electron-builder --win --x64 --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: bloom-windows-installer
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          if-no-files-found: error
